  <title>GIA</title>

  <!-- Ícono cuadriculado -->
  <g fill="#005A8F">
    <rect x="18" y="25" width="38" height="38" rx="5"/>
    <rect x="62" y="25" width="38" height="38" rx="5"/>
    <rect x="18" y="69" width="38" height="38" rx="5"/>
    <rect x="62" y="69" width="38" height="38" rx="5"/>
  </g>

  <!-- Texto GIA recreado en vector/texto para alta definición -->
